# The visible display is an input-transparent layer. A normal control window
# exists only while Super is held over it, and Hyprland moves that window.

exec-once = $HOME/bin/keycast
bind = $win, k, exec, $HOME/bin/keycast

windowrule {
    name = keycast-control
    match:title = ^Keycast Control$

    float = yes
    pin = yes
    decorate = no
    no_initial_focus = yes
    no_blur = yes
    no_anim = yes
    rounding = 0
    border_size = 0
    size = 760 96
}

layerrule {
    name = keycast-layers
    match:namespace = ^(keycast|keycast-grid)$
    no_anim = yes
}
