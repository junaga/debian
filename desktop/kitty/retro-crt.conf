# Retro Amber CRT / Cyberdeck theme for kitty.
# Remove `include retro-crt.conf` from kitty.conf to disable.

# Font: none of the preferred retro families were installed, so use fallback.
font_family monospace
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.0
disable_ligatures always

# Amber phosphor core.
foreground #ffb84d
background #050300
background_opacity 0.82
background_blur 24
dynamic_background_opacity yes
transparent_background_colors #050300@0.82 #000000@0.82 #100800@0.82 #1a0f02@0.80

# CRT block cursor with a short amber trail.
cursor #ffc15a
cursor_text_color #120800
cursor_shape block
cursor_shape_unfocused hollow
cursor_blink_interval 0
cursor_trail 80
cursor_trail_decay 0.08 0.22
cursor_trail_start_threshold 2
cursor_trail_color #ffb000

# Selection and marks: readable, still monochrome amber.
selection_foreground #120800
selection_background #ffb84d
mark1_foreground #120800
mark1_background #ffb84d
mark2_foreground #120800
mark2_background #d8912f
mark3_foreground #120800
mark3_background #ffd28a

# ANSI palette compressed into amber/sepia levels for a monochrome workstation feel.
color0  #120800
color1  #b55d16
color2  #a87516
color3  #d9901f
color4  #b87923
color5  #c47d24
color6  #d8942d
color7  #ffb84d
color8  #5a340b
color9  #e07a22
color10 #d69a29
color11 #ffc15a
color12 #e6a03a
color13 #f0a13a
color14 #ffb347
color15 #ffe0a3

# Window chrome: compact, dark, and usable.
window_padding_width 2
placement_strategy top-left
active_border_color #ffb84d
inactive_border_color #3a2208
bell_border_color #ffc15a
tab_bar_background #050300
active_tab_foreground #120800
active_tab_background #ffb84d
inactive_tab_foreground #d8912f
inactive_tab_background #160b02
tab_title_template "{title}"

# Slightly soften dim text without losing legibility.
dim_opacity 0.62
